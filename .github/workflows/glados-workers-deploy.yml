name: Deploy GLaDOS Worker

on:
  push:
    branches:
      - main
    paths:
      - "glados-workers/**"
      - ".github/workflows/glados-workers-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glados-workers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: glados-workers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run type-check

      - name: Generate Worker types
        run: npm run cf:types

      - name: Apply D1 migrations
        run: npm run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
